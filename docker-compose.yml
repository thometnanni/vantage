version: "3.8"
services:
  app:
    image: sinanatra/vantage:0.0.1
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/vantage_dev"
      SECRET_KEY_BASE: "ZXYt57Sa0+aK65Yk6eKdwF9eTqXPjiKUQRgMwo+AR2maqcVRZUdcAo8/oSP/gJwC"
      PHX_SERVER: "true"
    depends_on:
      - db

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vantage_dev
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
